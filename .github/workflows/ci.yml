name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    # The API's tests do not need these yet, but the moment a repository test
    # exists it will — and a CI that only starts working after someone remembers
    # to add a service is a CI that blocks a PR for no reason.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis
          POSTGRES_DB: aegis_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aegis"
          --health-interval 5s --health-timeout 3s --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      NODE_ENV: test
      APP_URL: http://localhost:4000
      WEB_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://aegis:aegis@localhost:5432/aegis_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-only-secret-value-of-adequate-length-here

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The contract is a build input for both apps. Nothing typechecks without it.
      - name: Build contracts
        run: pnpm --filter @aegis/contracts build

      - name: Generate Prisma client
        run: pnpm --filter @aegis/api exec prisma generate

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm -r build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build only — Coolify owns deployment (AGENTS.md §7).
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
