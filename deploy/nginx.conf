# Aegis Signal — production edge.
#
# This is the reverse proxy that sits between Cloudflare and the two containers
# (the Next.js web app and the NestJS API). Coolify can own this, or it can run as
# a standalone nginx in front of the stack. It is NOT the local dev setup — locally
# the web app talks to the API directly.
#
# The topology it assumes:
#
#     Cloudflare ──► nginx (this) ──┬──► web  (Next.js)   :3000   /
#                                   └──► api  (NestJS)     :4000   /api, /socket.io
#
# Three things this file exists to get right, because each is a real incident if
# missed:
#   1. WebSocket upgrade for /socket.io — the live signal/notification feed dies
#      silently without it, and the app looks "frozen" rather than broken.
#   2. /metrics is NEVER exposed to the internet — it is internal observability,
#      scraped over the private network, and a public copy leaks platform state.
#   3. The body-size cap matches the API's own limit, so a rejected-oversized-body
#      is one clear 413 at the edge, not a surprise deeper in.

upstream aegis_web {
    server web:3000;
    keepalive 32;
}

upstream aegis_api {
    server api:4000;
    keepalive 32;
}

# Cloudflare terminates TLS; this listens on 80 behind it. If nginx terminates TLS
# instead, add the listen 443 ssl block and certificate paths here.
server {
    listen 80;
    server_name _;

    # Match the API's HTTP_BODY_LIMIT (256kb) so oversized bodies are turned away
    # once, cleanly, at the edge.
    client_max_body_size 256k;

    # Real client IP through Cloudflare, so rate limiting and audit actors are the
    # trader's address, not Cloudflare's edge node.
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 0.0.0.0/0;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/xml;
    gzip_min_length 1024;

    # Defence-in-depth headers. helmet sets these on API responses too; nginx
    # covers the static web responses and anything that bypasses the app.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Never public ─────────────────────────────────────────────────────────
    # Observability and liveness are internal. Prometheus scrapes /metrics over the
    # private network; Coolify hits /health on the container directly. Neither has
    # any business answering the public internet.
    location /metrics { return 404; }
    location = /health { return 404; }

    # ── Live feed: WebSocket upgrade is mandatory ────────────────────────────
    location /socket.io/ {
        proxy_pass http://aegis_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived: a socket should not be culled mid-session by an idle timeout.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── API ──────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://aegis_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 35s;   # just past the API's 30s request timeout
    }

    # ── Web app (everything else) ────────────────────────────────────────────
    location / {
        proxy_pass http://aegis_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;      # Next.js HMR / RSC streaming
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
